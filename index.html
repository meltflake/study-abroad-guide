<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5">
<meta name="theme-color" content="#1a365d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>留学择校通 | StudyAbroad Guide</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a365d;--navy-light:#2a4a7f;--navy-dark:#0f2440;
  --gold:#d4a84b;--gold-light:#e8c876;--gold-dark:#b8912e;
  --white:#ffffff;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;
  --gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;
  --gray-700:#334155;--gray-800:#1e293b;
  --green:#16a34a;--yellow:#eab308;--red:#dc2626;
  --radius:12px;--shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -4px rgba(0,0,0,.1);
  --transition:all .3s ease;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
*{-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--gray-800);background:var(--gray-50);line-height:1.6}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit}
img{max-width:100%}

/* ===== Navigation ===== */
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--navy);backdrop-filter:blur(10px);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.nav-brand{color:var(--gold);font-size:1.25rem;font-weight:700;letter-spacing:.5px}
.nav-brand span{color:var(--white);font-weight:400;opacity:.8;font-size:.9rem;margin-left:.5rem}
.nav-links{display:flex;align-items:center;gap:1.5rem}
.nav-links a{color:var(--gray-200);font-size:.9rem;transition:var(--transition);padding:.4rem .8rem;border-radius:6px}
.nav-links a:hover{color:var(--gold);background:rgba(255,255,255,.08)}
.lang-toggle{background:var(--gold);color:var(--navy);border:none;padding:.45rem 1rem;border-radius:20px;font-size:.85rem;font-weight:600;transition:var(--transition)}
.lang-toggle:hover{background:var(--gold-light);transform:scale(1.05)}

/* ===== Hero ===== */
.hero{background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy) 50%,var(--navy-light) 100%);padding:8rem 2rem 5rem;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(212,168,75,.08) 0%,transparent 50%);animation:heroGlow 8s ease-in-out infinite alternate}
@keyframes heroGlow{0%{transform:translate(0,0)}100%{transform:translate(5%,3%)}}
.hero-content{position:relative;z-index:1;max-width:800px;margin:0 auto}
.hero h1{font-size:3rem;color:var(--white);margin-bottom:.5rem;font-weight:800}
.hero h1 .gold{color:var(--gold)}
.hero .subtitle{font-size:1.2rem;color:var(--gray-300);margin-bottom:2rem}
.hero-stats{display:flex;justify-content:center;gap:3rem;margin-top:2.5rem}
.hero-stat{text-align:center}
.hero-stat .num{font-size:2rem;font-weight:700;color:var(--gold)}
.hero-stat .label{font-size:.85rem;color:var(--gray-400);margin-top:.2rem}
.scroll-hint{margin-top:2.5rem;color:var(--gray-400);font-size:.85rem;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}

/* ===== Section Common ===== */
.section{padding:4rem 2rem}
.section-title{text-align:center;font-size:1.8rem;color:var(--navy);margin-bottom:.5rem;font-weight:700}
.section-desc{text-align:center;color:var(--gray-500);margin-bottom:2.5rem;font-size:1rem}
.container{max-width:1200px;margin:0 auto}

/* ===== Controls ===== */
.controls{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;margin-bottom:2rem;align-items:center}
.search-box{position:relative;flex:1;max-width:350px}
.search-box input{width:100%;padding:.7rem 1rem .7rem 2.5rem;border:2px solid var(--gray-200);border-radius:10px;font-size:.95rem;transition:var(--transition);background:var(--white)}
.search-box input:focus{border-color:var(--gold);outline:none;box-shadow:0 0 0 3px rgba(212,168,75,.15)}
.search-box::before{content:'🔍';position:absolute;left:.8rem;top:50%;transform:translateY(-50%);font-size:1rem}
.filter-group{display:flex;gap:.5rem;flex-wrap:wrap}
.filter-btn{padding:.55rem 1.2rem;border:2px solid var(--gray-200);background:var(--white);border-radius:8px;font-size:.85rem;font-weight:500;transition:var(--transition);color:var(--gray-600)}
.filter-btn:hover{border-color:var(--navy);color:var(--navy)}
.filter-btn.active{background:var(--navy);color:var(--white);border-color:var(--navy)}
.sort-select{padding:.55rem 1rem;border:2px solid var(--gray-200);border-radius:8px;font-size:.85rem;background:var(--white);color:var(--gray-600);transition:var(--transition)}
.sort-select:focus{border-color:var(--gold);outline:none}

/* ===== School Cards Grid ===== */
.schools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:1.5rem}
.school-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:var(--transition);cursor:pointer;border:2px solid transparent;position:relative}
.school-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--gold)}
.school-card.selected{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,75,.2)}
.school-card.selected::after{content:'✓';position:absolute;top:.75rem;right:.75rem;background:var(--gold);color:var(--white);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700}
.card-header{background:linear-gradient(135deg,var(--navy),var(--navy-light));padding:1.2rem 1.5rem;display:flex;justify-content:space-between;align-items:flex-start}
.card-header .school-name{color:var(--white);font-size:1.15rem;font-weight:700;line-height:1.3}
.card-header .school-name-en{color:var(--gray-300);font-size:.8rem;font-weight:400;margin-top:2px}
.card-header .flag{font-size:1.8rem;flex-shrink:0;margin-left:.5rem}
.card-body{padding:1.2rem 1.5rem}
.card-tags{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem}
.tag{padding:.25rem .65rem;border-radius:6px;font-size:.75rem;font-weight:600}
.tag-rank{background:#eff6ff;color:#1d4ed8}
.tag-tuition{background:#fef3c7;color:#92400e}
.tag-city{background:#f0fdf4;color:#166534}
.card-info{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.card-info-item{display:flex;align-items:center;gap:.4rem;font-size:.85rem;color:var(--gray-600)}
.card-info-item .icon{font-size:1rem}
.safety-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;border-radius:6px;font-size:.78rem;font-weight:600}
.safety-high{background:#dcfce7;color:#166534}
.safety-mid{background:#fef9c3;color:#854d0e}
.safety-low{background:#fee2e2;color:#991b1b}
.card-majors{margin-top:.8rem;padding-top:.8rem;border-top:1px solid var(--gray-100)}
.card-majors span{font-size:.8rem;color:var(--gray-500);display:block;margin-bottom:.3rem;font-weight:600}
.card-majors .major-list{display:flex;flex-wrap:wrap;gap:.3rem}
.card-majors .major{background:var(--gray-100);color:var(--gray-600);padding:.15rem .5rem;border-radius:4px;font-size:.75rem}
.card-expand-hint{text-align:center;padding:.6rem;color:var(--gray-400);font-size:.8rem;border-top:1px solid var(--gray-100)}

/* ===== Expanded Detail ===== */
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;justify-content:center;align-items:flex-start;padding:2rem;overflow-y:auto;backdrop-filter:blur(3px)}
.detail-overlay.show{display:flex}
.detail-panel{background:var(--white);border-radius:16px;max-width:800px;width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.detail-close{position:sticky;top:0;text-align:right;padding:1rem 1.5rem .5rem;background:var(--white);z-index:1;border-radius:16px 16px 0 0}
.detail-close button{background:var(--gray-100);border:none;width:36px;height:36px;border-radius:50%;font-size:1.2rem;transition:var(--transition)}
.detail-close button:hover{background:var(--gray-200)}
.detail-header{background:linear-gradient(135deg,var(--navy),var(--navy-light));padding:2rem 2.5rem;margin:0 1rem;border-radius:12px;color:var(--white)}
.detail-header h2{font-size:1.6rem;margin-bottom:.3rem}
.detail-header .sub{color:var(--gray-300);font-size:.95rem}
.detail-content{padding:1.5rem 2rem 2rem}
.detail-section{margin-bottom:1.5rem}
.detail-section h3{font-size:1.05rem;color:var(--navy);margin-bottom:.8rem;padding-bottom:.4rem;border-bottom:2px solid var(--gold);display:inline-block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem .8rem}
.detail-grid .item{display:flex;justify-content:space-between;padding:.5rem .8rem;background:var(--gray-50);border-radius:8px;font-size:.9rem}
.detail-grid .item .label{color:var(--gray-500);font-weight:500}
.detail-grid .item .value{color:var(--gray-800);font-weight:600}
.detail-desc{color:var(--gray-600);font-size:.92rem;line-height:1.7}

/* ===== Compare ===== */
.compare-bar{position:fixed;bottom:0;left:0;right:0;background:var(--navy);color:var(--white);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;z-index:1500;transform:translateY(100%);transition:var(--transition);box-shadow:0 -4px 20px rgba(0,0,0,.2)}
.compare-bar.show{transform:translateY(0)}
.compare-bar .selected-list{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.compare-chip{background:rgba(255,255,255,.15);padding:.3rem .8rem;border-radius:20px;font-size:.85rem;display:flex;align-items:center;gap:.4rem}
.compare-chip button{background:none;border:none;color:var(--gray-300);font-size:1rem;padding:0;line-height:1}
.compare-btn{background:var(--gold);color:var(--navy);border:none;padding:.6rem 1.5rem;border-radius:8px;font-weight:700;font-size:.9rem;transition:var(--transition)}
.compare-btn:hover{background:var(--gold-light);transform:scale(1.03)}
.compare-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ===== Compare Modal ===== */
.compare-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:3000;justify-content:center;align-items:flex-start;padding:2rem;overflow-y:auto;backdrop-filter:blur(3px)}
.compare-overlay.show{display:flex}
.compare-panel{background:var(--white);border-radius:16px;max-width:1100px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease;padding:2rem}
.compare-panel h2{text-align:center;color:var(--navy);margin-bottom:1.5rem}
.compare-table{width:100%;border-collapse:collapse}
.compare-table th,.compare-table td{padding:.7rem 1rem;text-align:left;border-bottom:1px solid var(--gray-200);font-size:.88rem}
.compare-table th{background:var(--gray-50);color:var(--gray-500);font-weight:600;position:sticky;top:0;width:160px}
.compare-table td{color:var(--gray-700)}
.compare-table thead th{background:var(--navy);color:var(--white);font-weight:700;font-size:.95rem}
.compare-close{display:block;margin:1.5rem auto 0;background:var(--gray-200);border:none;padding:.6rem 2rem;border-radius:8px;font-size:.9rem;color:var(--gray-600);transition:var(--transition)}
.compare-close:hover{background:var(--gray-300)}

/* ===== Calculator ===== */
.calc-section{background:var(--white);max-width:700px;margin:0 auto;border-radius:var(--radius);box-shadow:var(--shadow);padding:2rem 2.5rem}
.calc-row{display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
.calc-field{flex:1;min-width:200px}
.calc-field label{display:block;font-size:.85rem;color:var(--gray-600);margin-bottom:.3rem;font-weight:500}
.calc-field select,.calc-field input{width:100%;padding:.65rem 1rem;border:2px solid var(--gray-200);border-radius:8px;font-size:.9rem;transition:var(--transition)}
.calc-field select:focus,.calc-field input:focus{border-color:var(--gold);outline:none}
.calc-result{background:linear-gradient(135deg,var(--navy),var(--navy-light));border-radius:12px;padding:1.5rem 2rem;color:var(--white);margin-top:1.5rem;text-align:center}
.calc-result .total{font-size:2rem;font-weight:700;color:var(--gold);margin:.5rem 0}
.calc-result .breakdown{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:1rem;text-align:left}
.calc-result .breakdown .item{display:flex;justify-content:space-between;font-size:.85rem;padding:.3rem .6rem;background:rgba(255,255,255,.08);border-radius:6px}
.calc-result .breakdown .item .label{color:var(--gray-300)}
.calc-result .breakdown .item .val{color:var(--gold-light);font-weight:600}

/* ===== Footer ===== */
.footer{background:var(--navy-dark);color:var(--gray-400);text-align:center;padding:2.5rem 2rem;font-size:.85rem}
.footer .brand{color:var(--gold);font-weight:700;font-size:1.1rem;margin-bottom:.5rem}

/* ===== Responsive - Tablet ===== */
@media(max-width:1024px){
  .schools-grid{grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
  .detail-panel{max-width:95vw}
  .compare-panel{max-width:95vw}
}

/* ===== Responsive - Mobile ===== */
@media(max-width:768px){
  /* Nav */
  .navbar{padding:0 .8rem;height:56px}
  .nav-brand{font-size:1.05rem}
  .nav-brand span{display:none}
  .nav-links{gap:.5rem}
  .nav-links a{display:none}
  .lang-toggle{padding:.35rem .8rem;font-size:.8rem}

  /* Hero */
  .hero{padding:5.5rem 1.2rem 3rem}
  .hero h1{font-size:1.8rem}
  .hero h1 .gold{display:block;font-size:1rem;margin-top:.3rem}
  .hero .subtitle{font-size:.92rem;padding:0 .5rem}
  .hero-stats{gap:1.2rem;margin-top:1.5rem}
  .hero-stat .num{font-size:1.5rem}
  .hero-stat .label{font-size:.75rem}
  .scroll-hint{margin-top:1.5rem;font-size:.8rem}

  /* Sections */
  .section{padding:2.5rem 1rem}
  .section-title{font-size:1.4rem}
  .section-desc{font-size:.88rem;padding:0 .5rem;margin-bottom:1.5rem}

  /* Controls */
  .controls{flex-direction:column;align-items:stretch;gap:.8rem}
  .search-box{max-width:100%}
  .search-box input{padding:.65rem 1rem .65rem 2.3rem;font-size:.9rem}
  .filter-group{justify-content:center;gap:.4rem}
  .filter-btn{padding:.5rem .9rem;font-size:.82rem}
  .sort-select{width:100%;padding:.6rem 1rem;font-size:.88rem}

  /* Cards */
  .schools-grid{grid-template-columns:1fr;gap:1rem}
  .school-card:hover{transform:none}
  .card-header{padding:1rem 1.2rem}
  .card-header .school-name{font-size:1.05rem}
  .card-body{padding:1rem 1.2rem}
  .card-info{grid-template-columns:1fr}
  .card-expand-hint{padding:.5rem;font-size:.78rem}

  /* Detail overlay - full screen on mobile */
  .detail-overlay{padding:.5rem;align-items:flex-start}
  .detail-panel{max-width:100%;max-height:95vh;border-radius:12px}
  .detail-close{padding:.8rem 1rem .3rem}
  .detail-header{margin:0 .5rem;padding:1.2rem 1.2rem;border-radius:10px}
  .detail-header h2{font-size:1.25rem}
  .detail-header .sub{font-size:.82rem}
  .detail-content{padding:1rem 1.2rem 1.5rem}
  .detail-section h3{font-size:.95rem}
  .detail-grid{grid-template-columns:1fr;gap:.4rem}
  .detail-grid .item{font-size:.85rem;padding:.45rem .7rem}
  .detail-desc{font-size:.88rem}

  /* Compare bar */
  .compare-bar{padding:.8rem 1rem;flex-direction:column;gap:.6rem;align-items:stretch}
  .compare-bar .selected-list{justify-content:center}
  .compare-chip{font-size:.8rem;padding:.25rem .6rem}
  .compare-btn{width:100%;text-align:center;padding:.55rem 1rem}

  /* Compare modal */
  .compare-overlay{padding:.5rem}
  .compare-panel{padding:1rem;border-radius:12px;max-height:95vh}
  .compare-panel h2{font-size:1.2rem;margin-bottom:1rem}
  .compare-table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .compare-table th,.compare-table td{padding:.45rem .6rem;font-size:.78rem}
  .compare-table th{white-space:nowrap}
  .compare-table th{width:100px;min-width:100px}

  /* Calculator */
  .calc-section{padding:1.2rem 1rem}
  .calc-row{flex-direction:column;gap:.8rem}
  .calc-field{min-width:100%}
  .calc-field label{font-size:.82rem}
  .calc-field select,.calc-field input{padding:.6rem .8rem;font-size:.88rem}
  .calc-result{padding:1.2rem 1rem;border-radius:10px}
  .calc-result .total{font-size:1.6rem}
  .calc-result .breakdown{grid-template-columns:1fr;gap:.4rem}
  .calc-result .breakdown .item{font-size:.82rem}

  /* Footer */
  .footer{padding:2rem 1rem;font-size:.8rem}
}

/* ===== Responsive - Small Phone ===== */
@media(max-width:380px){
  .hero h1{font-size:1.5rem}
  .hero .subtitle{font-size:.85rem}
  .section-title{font-size:1.2rem}
  .filter-btn{padding:.4rem .7rem;font-size:.78rem}
  .card-header .school-name{font-size:.95rem}
  .tag{font-size:.7rem;padding:.2rem .5rem}
  .detail-header h2{font-size:1.1rem}
  .compare-table th,.compare-table td{font-size:.72rem;padding:.35rem .4rem}
}

/* ===== Touch & Interaction ===== */
@media(hover:none){
  .school-card:hover{transform:none;box-shadow:var(--shadow)}
  .school-card:active{transform:scale(.98);transition:transform .1s}
  .filter-btn:active{background:var(--navy);color:var(--white);border-color:var(--navy)}
  .lang-toggle:active{transform:scale(.95)}
}

/* ===== Safe area for notched phones ===== */
@supports(padding:max(0px)){
  .navbar{padding-left:max(.8rem,env(safe-area-inset-left));padding-right:max(.8rem,env(safe-area-inset-right))}
  .compare-bar{padding-bottom:max(.8rem,env(safe-area-inset-bottom))}
  .footer{padding-bottom:max(2rem,env(safe-area-inset-bottom))}
}

/* ===== Landscape phone ===== */
@media(max-height:500px) and (orientation:landscape){
  .hero{padding:4rem 1.5rem 2rem}
  .hero h1{font-size:1.5rem}
  .hero-stats{display:none}
  .scroll-hint{display:none}
}

/* ===== No Results ===== */
.no-results{text-align:center;padding:3rem;color:var(--gray-400)}
.no-results .emoji{font-size:3rem;margin-bottom:.5rem}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-brand">留学择校通 <span>StudyAbroad Guide</span></div>
  <div class="nav-links">
    <a href="#schools" data-i18n="nav_schools">院校浏览</a>
    <a href="#calculator" data-i18n="nav_calc">费用计算</a>
    <button class="lang-toggle" onclick="toggleLang()">EN / 中</button>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-content">
    <h1><span data-i18n="hero_title">留学择校通</span> <span class="gold">/ StudyAbroad Guide</span></h1>
    <p class="subtitle" data-i18n="hero_subtitle">帮助家长做出明智的留学决策 — 择校、费用、安全，一站掌握</p>
    <div class="hero-stats">
      <div class="hero-stat"><div class="num">6</div><div class="label" data-i18n="hero_s1">精选院校</div></div>
      <div class="hero-stat"><div class="num">3</div><div class="label" data-i18n="hero_s2">热门国家</div></div>
      <div class="hero-stat"><div class="num">∞</div><div class="label" data-i18n="hero_s3">可能性</div></div>
    </div>
    <div class="scroll-hint">↓ <span data-i18n="hero_scroll">向下滚动探索</span></div>
  </div>
</section>

<!-- Schools Section -->
<section class="section" id="schools">
  <div class="container">
    <h2 class="section-title" data-i18n="section_schools">院校一览</h2>
    <p class="section-desc" data-i18n="section_schools_desc">点击卡片查看详情，勾选后可对比不同学校（最多3所）</p>

    <!-- Controls -->
    <div class="controls">
      <div class="search-box">
        <input type="text" id="searchInput" data-i18n-placeholder="search_placeholder" placeholder="搜索学校名称..." oninput="renderCards()">
      </div>
      <div class="filter-group" id="countryFilters">
        <button class="filter-btn active" data-country="all" onclick="setFilter(this)" data-i18n="filter_all">全部</button>
        <button class="filter-btn" data-country="US" onclick="setFilter(this)">🇺🇸 <span data-i18n="filter_us">美国</span></button>
        <button class="filter-btn" data-country="UK" onclick="setFilter(this)">🇬🇧 <span data-i18n="filter_uk">英国</span></button>

  detail_major_tuition:{zh:'💰 各专业学费差异',en:'💰 Tuition by Major'},
  compare_visa:{zh:'签证路径',en:'Visa Pathway'},
  compare_housing_label:{zh:'住宿',en:'Housing'},
  compare_graduation:{zh:'毕业率',en:'Graduation Rate'},
  compare_employment:{zh:'就业数据',en:'Employment'},
  compare_healthcare:{zh:'医疗保障',en:'Healthcare'},
  compare_application:{zh:'申请指南',en:'How to Apply'},
};

function t(key){ return (I18N[key] && I18N[key][lang]) || key; }

function toggleLang(){
  lang = lang==='zh'?'en':'zh';
  // Update all data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.getAttribute('data-i18n');
    if(I18N[key]) el.textContent = I18N[key][lang];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{
    const key = el.getAttribute('data-i18n-placeholder');
    if(I18N[key]) el.placeholder = I18N[key][lang];
  });
  // Update sort select options
  document.querySelector('[value="rank"]').textContent = t('sort_rank');
  document.querySelector('[value="rank_the"]').textContent = t('sort_rank_the');
  document.querySelector('[value="rank_usnews"]').textContent = t('sort_rank_usnews');
  document.querySelector('[value="rank_arwu"]').textContent = t('sort_rank_arwu');
  document.querySelector('[value="tuition_asc"]').textContent = t('sort_tuition_asc');
  document.querySelector('[value="tuition_desc"]').textContent = t('sort_tuition_desc');
  renderCards();
  populateCalcSelect();
  calcCost();
}

// ===== STATE =====
let currentCountry = 'all';
let selectedIds = [];

function setFilter(btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentCountry = btn.dataset.country;
  renderCards();
}

function getFiltered(){
  let list = [...SCHOOLS];
  // country
  if(currentCountry!=='all') list = list.filter(s=>s.country===currentCountry);
  // search
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if(q) list = list.filter(s=> s.name.zh.toLowerCase().includes(q) || s.name.en.toLowerCase().includes(q));
  // sort
  const sort = document.getElementById('sortSelect').value;
  if(sort==='rank') list.sort((a,b)=>a.qs-b.qs);
  else if(sort==='rank_the') list.sort((a,b)=>a.the-b.the);
  else if(sort==='rank_usnews') list.sort((a,b)=>a.usnews-b.usnews);
  else if(sort==='rank_arwu') list.sort((a,b)=>a.arwu-b.arwu);
  else if(sort==='tuition_asc') list.sort((a,b)=>a.tuition-b.tuition);
  else if(sort==='tuition_desc') list.sort((a,b)=>b.tuition-a.tuition);
  return list;
}

function safetyClass(score){
  if(score>=8) return 'safety-high';
  if(score>=6) return 'safety-mid';
  return 'safety-low';
}
function safetyLabel(score){
  if(score>=8) return lang==='zh'?'安全':'Safe';
  if(score>=6) return lang==='zh'?'良好':'Good';
  return lang==='zh'?'需注意':'Caution';
}

function renderCards(){
  const grid = document.getElementById('schoolsGrid');
  const list = getFiltered();
  if(!list.length){
    grid.innerHTML = `<div class="no-results" style="grid-column:1/-1"><div class="emoji">🔍</div><p>${t('no_results')}</p></div>`;
    return;
  }
  grid.innerHTML = list.map(s=>{
    const sel = selectedIds.includes(s.id);
    return `
    <div class="school-card ${sel?'selected':''}" onclick="openDetail('${s.id}')" data-id="${s.id}">
      <div class="card-header">
        <div>
          <div class="school-name">${s.name[lang]}</div>
          <div class="school-name-en">${lang==='zh'?s.name.en:s.name.zh}</div>
        </div>
        <div class="flag">${s.flag}</div>
      </div>
      <div class="card-body">
        <div class="card-tags">
          <span class="tag tag-rank">QS #${s.qs}</span>
          <span class="tag tag-rank">THE #${s.the}</span>
          <span class="tag tag-rank" style="background:#f0fdf4;color:#166534">USNews #${s.usnews}</span>
          <span class="tag tag-rank" style="background:#fef3c7;color:#92400e">ARWU #${s.arwu}</span>
          <span class="tag tag-tuition">${s.tuitionRange ? '$'+s.tuitionRange[0].toLocaleString()+'~$'+s.tuitionRange[1].toLocaleString() : '$'+s.tuition.toLocaleString()}/yr</span>
          <span class="tag tag-city">${s.city[lang]}</span>
        </div>
        <div class="card-info">
          <div class="card-info-item"><span class="icon">🛡️</span> <span class="safety-badge ${safetyClass(s.safety)}">${s.safety}/10 ${safetyLabel(s.safety)}</span></div>
          <div class="card-info-item" style="justify-content:flex-end">
            <label style="cursor:pointer;font-size:.82rem;display:flex;align-items:center;gap:.3rem" onclick="event.stopPropagation()">
              <input type="checkbox" ${sel?'checked':''} onchange="toggleCompare('${s.id}',this.checked)" style="accent-color:var(--gold)"> ${lang==='zh'?'对比':'Compare'}
            </label>
          </div>
        </div>
        <div class="card-majors">
          <span>${t('top_majors')}</span>
          <div class="major-list">${s.majors[lang].map(m=>`<span class="major">${m}</span>`).join('')}</div>
        </div>
      </div>
      <div class="card-expand-hint">${t('click_detail')} →</div>
    </div>`;
  }).join('');
}

// ===== COMPARE =====
function toggleCompare(id, checked){
  if(checked){
    if(selectedIds.length>=3){ 
      event.target.checked=false; 
      return; 
    }
    if(!selectedIds.includes(id)) selectedIds.push(id);
  } else {
    selectedIds = selectedIds.filter(x=>x!==id);
  }
  updateCompareBar();
  renderCards();
}

function updateCompareBar(){
  const bar = document.getElementById('compareBar');
  const list = document.getElementById('compareList');
  const btn = document.getElementById('compareBtn');
  if(selectedIds.length){
    bar.classList.add('show');
    list.innerHTML = selectedIds.map(id=>{
      const s = SCHOOLS.find(x=>x.id===id);
      return `<span class="compare-chip">${s.flag} ${s.name[lang]} <button onclick="toggleCompare('${id}',false)">×</button></span>`;
    }).join('');
    btn.disabled = selectedIds.length<2;
  } else {
    bar.classList.remove('show');
  }
}

function openCompare(){
  if(selectedIds.length<2) return;
  const schools = selectedIds.map(id=>SCHOOLS.find(s=>s.id===id));
  const countryName = (c)=> t('country_'+c);
  const rows = [
    ['compare_country', s=>countryName(s.country)+' '+s.flag],
    ['compare_qs', s=>'#'+s.qs],
    ['compare_the', s=>'#'+s.the],
    ['compare_usnews', s=>'#'+s.usnews],
    ['compare_arwu', s=>'#'+s.arwu],
    ['compare_tuition', s=>s.tuitionRange ? '$'+s.tuitionRange[0].toLocaleString()+'~$'+s.tuitionRange[1].toLocaleString() : '$'+s.tuition.toLocaleString()],
    ['compare_safety_label', s=>`${s.safety}/10`],
    ['compare_city', s=>s.city[lang]],
    ['compare_climate', s=>s.climate[lang]],
    ['compare_living', s=>s.livingCost[lang]],
    ['compare_requirements', s=>`TOEFL ${s.requirements.TOEFL} / IELTS ${s.requirements.IELTS}`],
    ['compare_deadline', s=>s.deadline[lang]],
    ['compare_visa', s=>s.visa[lang]],
    ['compare_housing_label', s=>s.housing[lang]],
    ['compare_graduation', s=>s.graduationRate[lang]],
    ['compare_employment', s=>s.employment[lang]],
    ['compare_healthcare', s=>s.healthcare[lang]],
    ['compare_application', s=>s.application[lang]],
  ];
  const panel = document.getElementById('comparePanel');
  panel.innerHTML = `
    <h2>${t('compare_title')}</h2>
    <table class="compare-table">
      <thead><tr><th></th>${schools.map(s=>`<th>${s.flag} ${s.name[lang]}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(([key,fn])=>`<tr><th>${t(key)}</th>${schools.map(s=>`<td>${fn(s)}</td>`).join('')}</tr>`).join('')}</tbody>
    </table>
    <button class="compare-close" onclick="closeCompare()">${t('compare_close')}</button>
  `;
  document.getElementById('compareOverlay').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeCompare(){
  document.getElementById('compareOverlay').classList.remove('show');
  document.body.style.overflow='';
}

// ===== DETAIL =====

  const s = SCHOOLS.find(x=>x.id===id);

  const panel = document.getElementById('detailPanel');
  const breakdown = Object.entries(s.tuitionBreakdown[lang]).map(([k,v])=>`<div class="item"><span class="label">${k}</span><span class="value">$${v.toLocaleString()}</span></div>`).join('');
  panel.innerHTML = `
    <div class="detail-close"><button onclick="closeDetail()">✕</button></div>
    <div class="detail-header">

      <div class="sub" style="margin-top:.3rem">📊 QS #${s.qs} · THE #${s.the} · US News #${s.usnews} · ARWU #${s.arwu}</div>

        <p class="detail-desc">${s.housing[lang]}</p>
      </div>
      <div class="detail-section">
        <h3>${t('detail_graduation')}</h3>
        <p class="detail-desc">${s.graduationRate[lang]}</p>
      </div>

function closeDetail(){
  document.getElementById('detailOverlay').classList.remove('show');

// ===== CALCULATOR =====
const CNY_RATE = 7.25;
function populateCalcSelect(){
  const sel = document.getElementById('calcSchool');
  sel.innerHTML = SCHOOLS.map(s=>`<option value="${s.id}">${s.flag} ${s.name[lang]}</option>`).join('');
}
function calcCost(){
  const id = document.getElementById('calcSchool').value;
  const years = parseInt(document.getElementById('calcYears').value)||4;
  const s = SCHOOLS.find(x=>x.id===id);
  if(!s) return;
  const tuitionTotal = s.tuition * years;
  const livingTotal = s.livingCostAnnual * years;
  const insuranceTotal = s.insurance * years;
  const flightsTotal = s.flights * years;
  const total = tuitionTotal + livingTotal + insuranceTotal + flightsTotal;
  const totalCNY = Math.round(total * CNY_RATE);
  const div = document.getElementById('calcResult');
  div.innerHTML = `
    <div class="calc-result">
      <div>${t('calc_total_usd')}</div>
      <div class="total">$${total.toLocaleString()}</div>
      <div style="font-size:1.1rem;color:var(--gold-light)">${t('calc_total_cny')}：¥${totalCNY.toLocaleString()}</div>
      <div class="breakdown">
        <div class="item"><span class="label">${t('calc_tuition_total')}</span><span class="val">$${tuitionTotal.toLocaleString()}</span></div>
        <div class="item"><span class="label">${t('calc_living_total')}</span><span class="val">$${livingTotal.toLocaleString()}</span></div>
        <div class="item"><span class="label">${t('calc_insurance_total')}</span><span class="val">$${insuranceTotal.toLocaleString()}</span></div>
        <div class="item"><span class="label">${t('calc_flights_total')}</span><span class="val">$${flightsTotal.toLocaleString()}</span></div>
      </div>
      <p style="margin-top:1rem;font-size:.78rem;color:var(--gray-400)">${t('calc_note')}</p>
    </div>
  `;
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded',()=>{
  renderCards();
  populateCalcSelect();
  calcCost();
});

// Keyboard: Escape closes overlays
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeDetail();
    closeCompare();
  }
});
</script>
